<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Async File Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Async File Converter</h1>

    <input type="file" id="fileInput" />
    <button id="uploadBtn">Upload</button>

    <p id="status"></p>

    <button id="downloadBtn" style="display:none;">
      Download Converted File
    </button>
  </div>

  <script>
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const statusText = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");

    let currentJobId = null;
    let pollInterval = null;

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select a file first.");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      statusText.textContent = "Uploading...";

      try {
        const response = await fetch("/api/files/upload", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!data.jobId) {
          statusText.textContent = data.message || "Upload failed.";
          return;
        }

        currentJobId = data.jobId;
        statusText.textContent = "Conversion started...";
        startPolling();

      } catch (err) {
        statusText.textContent = "Upload failed.";
        console.error(err);
      }
    });

    function startPolling() {
      pollInterval = setInterval(async () => {
        try {
          const response = await fetch(`/api/files/status/${currentJobId}`);
          const data = await response.json();

          statusText.textContent = `Status: ${data.status}`;

          if (data.status === "completed") {
            clearInterval(pollInterval);
            downloadBtn.style.display = "inline-block";
          }

          if (data.status === "failed") {
            clearInterval(pollInterval);
          }

        } catch (err) {
          console.error("Polling error:", err);
        }
      }, 2000);
    }

    downloadBtn.addEventListener("click", () => {
      window.location.href = `/api/files/download/${currentJobId}`;
    });

  </script>

</body>
</html>
